<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A6B45">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>如烟 · Guitar + Vocal Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEDE8;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E5E3DD;--border2:#D0CEC8;
  --text:#1C1B18;--text2:#4A4845;--muted:#8C8A84;--muted2:#B8B6B0;
  --accent:#1A6B45;--accent-bg:#E8F4EE;--green:#1A6B45;--green-bg:#E8F4EE;
  --amber:#92560A;--amber-bg:#FBF2E6;--red:#9B2C2C;--red-bg:#FBEAEA;
  --radius:10px;--radius-sm:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;overflow-x:clip;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* Header */
.site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:max(16px,env(safe-area-inset-top));position:sticky;top:0;z-index:200;box-shadow:var(--shadow-sm);width:100%;}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1400px;margin:0 auto;}
.logo h1{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;color:var(--text);}
.logo h1 span{color:var(--accent);}
.logo p{font-size:0.65rem;color:var(--muted);margin-top:1px;font-weight:400;letter-spacing:0.02em;}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.hbtn{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.72rem;font-weight:600;padding:7px 12px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.hbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.hbtn.primary{background:var(--accent);border-color:var(--accent);color:white;}
.hbtn.primary:hover{background:#145535;}

/* Week nav */
.week-nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:65px;z-index:190;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;width:100%;}
.week-nav-wrap::-webkit-scrollbar{display:none;}
.week-nav{display:flex;width:max-content;min-width:100%;padding:0 8px;}
.wtab{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:0.72rem;padding:10px 14px;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;display:flex;flex-direction:column;gap:2px;align-items:flex-start;}
.wtab-name{font-size:0.75rem;font-weight:700;}
.wtab-dates{font-size:0.6rem;font-weight:400;color:var(--muted2);font-family:'JetBrains Mono',monospace;}
.wtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.wtab.active .wtab-dates{color:var(--accent);opacity:0.7;}
.wtab:hover:not(.active){color:var(--text2);}

/* Week view */
.week-view{max-width:1400px;margin:0 auto;}
.week-banner{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border);}
.week-banner h2{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;color:var(--text);}
.week-banner p{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.day-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-top:1px solid var(--border);min-height:calc(100vh - 180px);}
@media(max-width:1100px){.day-grid{grid-template-columns:repeat(4,minmax(0,1fr));}}
@media(max-width:700px){.day-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}

.day-col{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);}
.day-col:last-child{border-right:none;}
.day-head{padding:10px 10px 8px;background:var(--surface);border-bottom:1px solid var(--border);border-top:3px solid transparent;position:sticky;top:109px;z-index:10;}
.day-name{font-size:0.78rem;font-weight:700;letter-spacing:-0.01em;color:var(--text);}
.day-date{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);margin-top:1px;}
.day-date.today{color:var(--accent);font-weight:600;}
.day-phase{font-size:0.6rem;font-weight:700;margin-top:3px;display:block;}
.day-log-btn{width:100%;margin-top:6px;padding:5px;border:1.5px solid var(--border2);background:var(--surface);font-size:0.6rem;font-weight:700;color:var(--text2);border-radius:4px;cursor:pointer;transition:all 0.12s;font-family:inherit;}
.day-log-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.day-cards{flex:1;padding:6px 6px 14px;display:flex;flex-direction:column;}
.block-divider{font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);padding:8px 2px 3px;border-bottom:1px solid var(--border);margin-bottom:4px;margin-top:6px;}
.block-divider:first-child{margin-top:2px;}
.block-divider.warmup{color:#0D6E6E;}
.block-divider.technique{color:#1D4E89;}
.block-divider.songwork{color:var(--accent);}
.block-divider.cooldown{color:#6B3FA0;}
.block-divider.rest{color:#6B6860;}

.wcard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--muted2);border-radius:var(--radius-sm);padding:8px 8px 7px;margin-bottom:5px;cursor:pointer;position:relative;transition:box-shadow 0.15s,transform 0.12s;-webkit-user-select:none;user-select:none;}
.wcard:hover{box-shadow:var(--shadow);}
.wcard:active{transform:scale(0.995);}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.ex-icon{width:34px;height:34px;min-width:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-icon svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.card-name{font-size:0.72rem;font-weight:700;line-height:1.3;color:var(--text);flex:1;min-width:0;}
.done-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;margin-left:5px;vertical-align:middle;}
.skip-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-left:5px;vertical-align:middle;}
.partial-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6B3FA0;flex-shrink:0;margin-left:5px;vertical-align:middle;}
.deferred-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2563EB;flex-shrink:0;margin-left:5px;vertical-align:middle;}
.card-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:2px 5px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);white-space:nowrap;}
.chip.tempo{background:var(--amber-bg);border-color:#E8C07A;color:var(--amber);}
.chip.dur{background:var(--accent-bg);border-color:#A8C0DC;color:var(--accent);}
.chip.tool{background:#F0E8F7;border-color:#C4A8DC;color:#6B3FA0;}
.card-cue{font-size:0.62rem;color:var(--muted);font-style:italic;line-height:1.4;border-top:1px solid var(--border);padding-top:4px;margin-top:6px;}
.expand-hint{position:absolute;bottom:5px;right:7px;font-size:0.48rem;color:var(--muted2);opacity:0.6;pointer-events:none;}

/* Expanded full-screen card */
.card-scrim{display:none;position:fixed;inset:0;background:rgba(28,27,24,0.45);z-index:899;}
.card-scrim.open{display:block;}
.exp{display:none;position:fixed;inset:0;z-index:910;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
.exp.open{display:flex;}
.exp-close{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.65rem;color:var(--muted);font-weight:600;position:sticky;top:0;z-index:10;}
.exp-close button{border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 14px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:inherit;}
.exp-body{padding:0 0 calc(env(safe-area-inset-bottom) + 30px);}
.exp-hero{padding:26px 22px 20px;display:flex;gap:14px;align-items:flex-start;}
.exp-icon{width:50px;height:50px;min-width:50px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.exp-icon svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.exp-movement{font-size:1.4rem;font-weight:800;color:var(--text);line-height:1.2;letter-spacing:-0.02em;}
.exp-phase{font-size:0.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:5px;}
.exp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px 18px;}
.exp-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;}
.exp-stat-label{font-size:0.55rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
.exp-stat-value{font-size:0.9rem;font-weight:700;color:var(--text);line-height:1.25;font-family:'JetBrains Mono',monospace;}
.exp-cue-section{margin:0 20px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.exp-cue-label{font-size:0.55rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.exp-cue-text{font-size:0.92rem;line-height:1.75;color:var(--text2);}
.exp-cue-step{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.exp-cue-step:last-child{border-bottom:none;padding-bottom:0;}
.exp-cue-num{min-width:22px;height:22px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:0.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.exp-cue-step-text{font-size:0.88rem;line-height:1.6;color:var(--text2);}

/* Day Log overlay */
.dl-overlay{display:none;position:fixed;inset:0;z-index:920;background:var(--bg);flex-direction:column;}
.dl-overlay.open{display:flex;}
.dl-header{display:flex;align-items:center;gap:12px;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.dl-back{background:none;border:none;font-size:0.9rem;font-weight:700;color:var(--accent);cursor:pointer;font-family:inherit;}
.dl-header-title{font-size:0.95rem;font-weight:800;color:var(--text);flex:1;}
.dl-progress{font-size:0.62rem;font-weight:600;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.dl-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(env(safe-area-inset-bottom) + 30px);max-width:760px;margin:0 auto;width:100%;}
.dl-skip-bar{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:12px;margin-bottom:14px;}
.dl-skip-bar-title{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.dl-skip-reasons{display:flex;flex-wrap:wrap;gap:6px;}
.dl-skip-reason{padding:6px 11px;border:1.5px solid var(--border2);border-radius:20px;font-size:0.66rem;font-weight:600;background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;}
.dl-skip-reason.active{background:var(--amber);border-color:var(--amber);color:white;}
.dl-block-label{font-size:0.56rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);padding:12px 0 5px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.dl-exercise{border:1px solid var(--border);border-radius:var(--radius);padding:12px 13px;margin-bottom:9px;}
.dl-ex-name{font-size:0.86rem;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.dl-ex-name.is-done{color:var(--muted);text-decoration:line-through;}
.dl-statusbtns{display:flex;gap:5px;}
.dl-sbtn{padding:5px 9px;font-size:0.66rem;font-weight:800;border-radius:5px;cursor:pointer;font-family:inherit;}
.dl-chips{display:flex;flex-wrap:wrap;gap:4px;margin:7px 0 0;}
.dl-cue{font-size:0.74rem;color:var(--text2);line-height:1.55;margin-top:8px;font-style:italic;}
.dl-notes{width:100%;border:1.5px solid var(--border2);border-radius:6px;padding:9px 11px;font-size:0.82rem;font-family:inherit;color:var(--text);background:var(--surface2);resize:vertical;min-height:64px;line-height:1.5;margin-top:9px;-webkit-appearance:none;}
.dl-notes:focus{outline:none;border-color:var(--accent);}

/* Benchmarks + Reference shared */
.panel{max-width:900px;margin:0 auto;padding:20px 20px 50px;}
.panel-h{margin-bottom:6px;}
.panel-h h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;}
.panel-h p{font-size:0.78rem;color:var(--muted);margin-top:3px;}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:14px;box-shadow:var(--shadow-sm);}
.bcard-title{font-size:0.95rem;font-weight:800;color:var(--accent);margin-bottom:3px;}
.bcard-sub{font-size:0.66rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.bcard ul{list-style:none;}
.bcard li{font-size:0.84rem;line-height:1.55;padding:6px 0 6px 20px;position:relative;border-bottom:1px solid var(--border);}
.bcard li:last-child{border-bottom:none;}
.bcard li::before{content:'✓';position:absolute;left:0;top:6px;color:var(--accent);font-weight:800;font-size:0.8rem;}

/* Chord diagrams */
.chord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-top:14px;}
.chord-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px 12px;text-align:center;box-shadow:var(--shadow-sm);}
.chord-box .cname{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
.chord-box svg{width:74px;height:88px;}
.chord-box .csub{font-size:0.58rem;color:var(--muted);margin-top:6px;}
.struct{margin-top:14px;}
.struct-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.struct-row:last-child{border-bottom:none;}
.struct-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:var(--accent-bg);color:var(--accent);white-space:nowrap;min-width:96px;text-align:center;}
.struct-tag.peak{background:var(--red-bg);color:var(--red);}
.struct-tag.inst{background:var(--surface2);color:var(--muted);}
.struct-body{font-size:0.8rem;color:var(--text2);line-height:1.45;}
.struct-body b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;}

.storage-banner{background:var(--amber-bg);color:var(--amber);font-size:0.72rem;padding:8px 16px;text-align:center;font-weight:600;display:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;padding:11px 20px;border-radius:24px;font-size:0.78rem;font-weight:600;z-index:999;transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:768px){
  .site-header{padding:10px 14px 8px;padding-top:max(10px,env(safe-area-inset-top));}
  .logo p{display:none;}
  .hbtn{font-size:0.78rem;padding:8px 11px;}
  .week-nav-wrap{top:52px;}
  .wtab-name{font-size:0.9rem;}.wtab-dates{font-size:0.7rem;}
  .wtab{padding:11px 13px;}
  .day-grid{grid-template-columns:minmax(0,1fr);min-height:auto;}
  .day-col{border-right:none;border-bottom:1px solid var(--border);}
  .day-head{position:relative;top:auto;border-top-width:4px;padding:13px 15px 11px;}
  .day-name{font-size:1.05rem;}.day-date{font-size:0.78rem;}.day-phase{font-size:0.78rem;}
  .day-log-btn{padding:10px;font-size:0.8rem;}
  .day-cards{padding:11px 15px 18px;}
  .wcard{padding:13px 13px 12px;margin-bottom:9px;border-left-width:4px;}
  .ex-icon{width:38px;height:38px;}.ex-icon svg{width:21px;height:21px;}
  .card-name{font-size:1rem;line-height:1.35;}
  .chip{font-size:0.74rem;padding:4px 9px;}
  .card-cue{font-size:0.84rem;line-height:1.55;}
  .expand-hint{display:none;}
  .block-divider{font-size:0.72rem;padding:11px 2px 5px;}
  .exp-stats{grid-template-columns:1fr;}
  .panel-h h2{font-size:1.15rem;}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <h1>如烟 <span>· Solo</span></h1>
      <p>Mayday · Guitar + Vocal · Capo 2 · Key A</p>
    </div>
    <div class="header-btns">
      <button class="hbtn" onclick="doExport()">Backup</button>
      <button class="hbtn" onclick="document.getElementById('importFile').click()">Restore</button>
      <button class="hbtn" onclick="doReset()">Reset</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="doImport(event)">
    </div>
  </div>
</header>

<div class="storage-banner" id="storageBanner">⚠ Browser storage unavailable — progress won't save this session.</div>

<div class="week-nav-wrap"><div class="week-nav" id="weekNav"></div></div>

<main id="mainContent"></main>

<!-- Expanded card -->
<div class="card-scrim" id="cardScrim" onclick="closeExp()"></div>
<div class="exp" id="expCard">
  <div class="exp-close">
    <span>Practice detail</span>
    <button onclick="closeExp()">✕ Close</button>
  </div>
  <div class="exp-body" id="expBody"></div>
</div>

<!-- Day log overlay -->
<div class="dl-overlay" id="dayLogOverlay">
  <div class="dl-header">
    <button class="dl-back" onclick="closeDayLog()">‹ Back</button>
    <div class="dl-header-title" id="dlTitle">Day</div>
    <div class="dl-progress" id="dlProgress"></div>
  </div>
  <div class="dl-body" id="dlBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================ CONFIG ============================ */
const START=new Date(2026,5,8); // Mon 8 Jun 2026 = Week 1 Monday
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_IDX={Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Saturday:5,Sunday:6};
const BLOCK_ORDER=['Warm-Up','Technique','Song Work','Cool-Down','Rest'];
const WEEKS_META=[
 {num:1,label:'Week 1',sub:'Foundations'},
 {num:2,label:'Week 2',sub:'Fluency & Picking'},
 {num:3,label:'Week 3',sub:'Picking + Strum'},
 {num:4,label:'Week 4',sub:'Full Pattern · Half 1'},
 {num:5,label:'Week 5',sub:'Whole Song · Hands Only'},
 {num:6,label:'Week 6',sub:'Voice + Guitar Begins'},
 {num:7,label:'Week 7',sub:'Choruses & Bridge'},
 {num:8,label:'Week 8',sub:'Full Song Together'},
 {num:9,label:'Week 9',sub:'Dynamics & Arrangement'},
 {num:10,label:'Week 10',sub:'Stage Prep'},
 {num:11,label:'Week 11',sub:'Dress Rehearsal'},
 {num:12,label:'Week 12',sub:'Performance'},
];

/* ============================ DATA ============================ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
let _seq=0;
function C(week,day,block,phase,movement,tempo,dur,tool,cue){
  return {id:'c'+(_seq++)+Math.random().toString(36).slice(2,5),week,day,phase,block,movement,tempo,dur,tool,cue,checks:{}};
}

let _ok=false;
function init(){
 try{localStorage.setItem('_t','1');localStorage.removeItem('_t');_ok=true;}catch(e){_ok=false;}
 const base=build();
 if(_ok){
  try{
   const s=localStorage.getItem('ruyan_plan');
   if(s){const saved=JSON.parse(s);
    // merge saved checks onto fresh structure by week+day+movement
    const idx={};saved.forEach(w=>{idx[w.week+'|'+w.day+'|'+w.movement]=w.checks||{};});
    base.forEach(w=>{const k=w.week+'|'+w.day+'|'+w.movement;if(idx[k])w.checks=idx[k];});
   }
  }catch(e){}
 } else {document.getElementById('storageBanner').style.display='block';}
 workouts=base;
}

/* ============================ DATES ============================ */
function getDate(week,day){const d=new Date(START);d.setDate(d.getDate()+(week-1)*7+DAY_IDX[day]);return d;}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function isToday(d){const n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}

/* ============================ COLORS / ICONS ============================ */
function phaseColor(p){const m={
 'foundations':'#1A6B45','fluency':'#0D6E6E','picking + strum':'#1D4E89','full pattern':'#1E40AF',
 'hands-only':'#6B3FA0','voice+guitar':'#92560A','coordination':'#B45309','integration':'#2563EB',
 'dynamics':'#9B2C2C','stage prep':'#1A6B45','rehearsal':'#6B3FA0','performance':'#9B2C2C','rest':'#6B6860'};
 return m[(p||'').toLowerCase()]||'#6B6860';}
function icon(block){
 const guitar='<svg viewBox="0 0 24 24"><circle cx="9" cy="15" r="4"/><path d="M11.8 12.2 18 6"/><path d="M16 4l4 4"/><path d="M17 3l1 1-1 1"/><circle cx="9" cy="15" r="1"/></svg>';
 const metro='<svg viewBox="0 0 24 24"><path d="M8 3h8l3 18H5z"/><path d="M12 21V8l4-2"/></svg>';
 const sing='<svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M8 21h8"/></svg>';
 const note='<svg viewBox="0 0 24 24"><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><path d="M9 18V5l12-2v13"/></svg>';
 const rest='<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
 if(block==='Warm-Up')return note;
 if(block==='Technique')return metro;
 if(block==='Song Work')return guitar;
 if(block==='Cool-Down')return sing;
 if(block==='Rest')return rest;
 return guitar;}

/* ============================ RENDER ============================ */
let activeWeek=1;
function renderNav(){
 const nav=document.getElementById('weekNav');
 let html=WEEKS_META.map(wm=>{
  const mon=getDate(wm.num,'Monday'),sun=getDate(wm.num,'Sunday');
  return `<button class="wtab ${activeWeek===wm.num?'active':''}" onclick="switchWeek(${wm.num})"><span class="wtab-name">${wm.label}</span><span class="wtab-dates">${fmtDate(mon)} – ${fmtDate(sun)}</span></button>`;
 }).join('');
 html+=`<button class="wtab ${activeWeek==='bench'?'active':''}" onclick="switchWeek('bench')"><span class="wtab-name" style="color:var(--accent)">★ Benchmarks</span><span class="wtab-dates">Weekly standards</span></button>`;
 html+=`<button class="wtab ${activeWeek==='ref'?'active':''}" onclick="switchWeek('ref')"><span class="wtab-name" style="color:#6B3FA0">♪ Reference</span><span class="wtab-dates">Chords &amp; structure</span></button>`;
 nav.innerHTML=html;
}
function switchWeek(n){activeWeek=n;render();window.scrollTo({top:0,behavior:'instant'});}

function render(){
 renderNav();
 const main=document.getElementById('mainContent');
 if(activeWeek==='bench'){main.innerHTML=renderBench();return;}
 if(activeWeek==='ref'){main.innerHTML=renderRef();return;}
 const wm=WEEKS_META.find(w=>w.num===activeWeek);if(!wm){main.innerHTML='';return;}
 const ww=workouts.filter(x=>x.week===wm.num);
 const logged=ww.filter(x=>Object.values(x.checks||{}).some(c=>c&&c.status&&c.status!=='none')).length;
 main.innerHTML=`<div class="week-view"><div class="week-banner"><div><h2>${wm.label} — ${wm.sub}</h2><p>${ww.length} practice items · ${logged} logged · Auto-saves to this browser</p></div></div><div class="day-grid">${DAYS.map(d=>renderDayCol(wm.num,d)).join('')}</div></div>`;
}

function renderDayCol(week,day){
 const date=getDate(week,day);const today=isToday(date);const dateStr=date.toISOString().slice(0,10);
 const dw=workouts.filter(x=>x.week===week&&x.day===day);
 const phase=dw[0]?.phase||'';const col=phaseColor(phase);
 const groups={};dw.forEach(w=>{const b=w.block||'Song Work';(groups[b]=groups[b]||[]).push(w);});
 const doneCount=dw.filter(w=>w.checks?.[dateStr]?.status==='done').length;
 const total=dw.filter(w=>w.block!=='Rest').length;
 let cards='';
 BLOCK_ORDER.forEach(b=>{
  if(!groups[b])return;
  const cls=b==='Warm-Up'?'warmup':b==='Technique'?'technique':b==='Song Work'?'songwork':b==='Cool-Down'?'cooldown':'rest';
  cards+=`<div class="block-divider ${cls}">${b}</div>`;
  groups[b].forEach(w=>{cards+=renderCard(w,dateStr,col);});
 });
 const isRest=dw.length===1&&dw[0].block==='Rest';
 const logBtn=isRest?'':`<button class="day-log-btn" onclick="openDayLog(${week},'${day}')">Log · ${doneCount}/${total}</button>`;
 return `<div class="day-col"><div class="day-head" style="border-top-color:${col}"><div class="day-name">${day}</div><div class="day-date ${today?'today':''}">${fmtDate(date)}${today?' · today':''}</div><span class="day-phase" style="color:${col}">${phase}</span>${logBtn}</div><div class="day-cards">${cards}</div></div>`;
}

function renderCard(w,dateStr,col){
 const st=w.checks?.[dateStr]?.status||'none';
 const dot=st==='done'?'<span class="done-dot"></span>':st==='skip'?'<span class="skip-dot"></span>':st==='partial'?'<span class="partial-dot"></span>':st==='deferred'?'<span class="deferred-dot"></span>':'';
 const showT=w.tempo&&w.tempo!=='—';const showD=w.dur&&w.dur!=='—';const showTool=w.tool&&w.tool!=='—';
 const chips=(showT?`<span class="chip tempo">♩ ${w.tempo}</span>`:'')+(showD?`<span class="chip dur">⏱ ${w.dur}</span>`:'')+(showTool?`<span class="chip tool">${w.tool}</span>`:'');
 return `<div class="wcard" style="border-left-color:${col}" onclick="openExp('${w.id}','${dateStr}')">
  <div class="card-top"><div class="ex-icon">${icon(w.block)}</div><div style="flex:1;min-width:0"><div class="card-name">${w.movement}${dot}</div><div class="card-chips">${chips}</div></div></div>
  ${w.cue?`<div class="card-cue">${w.cue.length>90?w.cue.slice(0,88)+'…':w.cue}</div>`:''}
  <span class="expand-hint">tap</span></div>`;
}

/* ============================ EXPAND ============================ */
function openExp(id,dateStr){
 const w=workouts.find(x=>x.id===id);if(!w)return;
 const col=phaseColor(w.phase);
 const stat=(lab,val)=>val&&val!=='—'?`<div class="exp-stat"><div class="exp-stat-label">${lab}</div><div class="exp-stat-value">${val}</div></div>`:'';
 let cue='';
 if(w.cue){
  if(w.cue.includes(' -> ')){cue=w.cue.split(' -> ').map((s,i)=>`<div class="exp-cue-step"><div class="exp-cue-num">${i+1}</div><div class="exp-cue-step-text">${s.trim()}</div></div>`).join('');}
  else{cue=`<div class="exp-cue-text">${w.cue}</div>`;}
 }
 document.getElementById('expBody').innerHTML=`
  <div class="exp-hero"><div class="exp-icon" style="background:${col}">${icon(w.block)}</div><div><div class="exp-movement">${w.movement}</div><div class="exp-phase">${w.phase} · ${w.block}</div></div></div>
  <div class="exp-stats">${stat('Tempo',w.tempo)}${stat('Duration',w.dur)}${stat('Tool / Focus',w.tool)}</div>
  ${w.cue?`<div class="exp-cue-section"><div class="exp-cue-label">Practice Detail</div>${cue}</div>`:''}`;
 document.getElementById('cardScrim').classList.add('open');
 document.getElementById('expCard').classList.add('open');
 document.body.style.overflow='hidden';
}
function closeExp(){document.getElementById('cardScrim').classList.remove('open');document.getElementById('expCard').classList.remove('open');document.body.style.overflow='';}

 const ds=daySkips[dateStr];
 let html=`<div class="dl-skip-bar"><div class="dl-skip-bar-title">Day Status</div><div class="dl-skip-reasons">
  <button class="dl-skip-reason ${!ds?.skipped?'active':''}" onclick="setDayStatus('done')" style="${!ds?.skipped?'background:var(--green);border-color:var(--green);color:white':''}">✓ Practised</button>
  ${SKIP_REASONS_DAY.map(r=>`<button class="dl-skip-reason ${ds?.reason===r.id?'active':''}" onclick="setDayStatus('${r.id}')">${r.e} ${r.l}</button>`).join('')}
 </div>${ds?.skipped?'<div style="font-size:0.64rem;color:var(--amber);margin-top:8px;font-weight:600">Day marked skipped — items below are informational.</div>':''}</div>`;
 BLOCK_ORDER.forEach(b=>{
  if(!groups[b])return;
  html+=`<div class="dl-block-label">${b}</div>`;
  groups[b].forEach(w=>{
   const st=getSt(w,dateStr);const done=st==='done',part=st==='partial',skip=st==='skip',def=st==='deferred';
   const notes=w.checks?.[dateStr]?.notes||'';const sr=w.checks?.[dateStr]?.skipReason||'';
   const showT=w.tempo&&w.tempo!=='—';const showD=w.dur&&w.dur!=='—';const showTool=w.tool&&w.tool!=='—';
   const chips=(showT?`<span class="chip tempo">♩ ${w.tempo}</span>`:'')+(showD?`<span class="chip dur">⏱ ${w.dur}</span>`:'')+(showTool?`<span class="chip tool">${w.tool}</span>`:'');
   const sc=done?'var(--green)':skip?'var(--amber)':part?'#6B3FA0':def?'#2563EB':'var(--border2)';
   const sb=done?'var(--green-bg)':skip?'var(--amber-bg)':part?'#F0E8F7':def?'#EBF0F7':'var(--surface)';
   const btn=(active,actColor,sym,fn)=>`<button class="dl-sbtn" onclick="${fn}" style="border:1.5px solid ${active?actColor:'var(--border2)'};background:${active?actColor:'var(--surface2)'};color:${active?'white':'var(--text2)'}">${sym}</button>`;
   html+=`<div class="dl-exercise" style="border-left:3px solid ${sc};background:${sb}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div class="dl-ex-name ${done?'is-done':''}">${w.movement}${skip&&sr?` <span style="font-size:0.62rem;color:var(--amber);font-weight:600">(${sr})</span>`:''}</div>
      <div class="dl-statusbtns">
       ${btn(done,'var(--green)','✓',`cycleSt('${w.id}','done')`)}
       ${btn(part,'#6B3FA0','◑',`cycleSt('${w.id}','partial')`)}
       ${btn(skip,'var(--amber)','S',`cycleSt('${w.id}','skip')`)}
      </div>
    </div>
    ${chips?`<div class="dl-chips">${chips}</div>`:''}
    ${w.cue?`<div class="dl-cue">${w.cue}</div>`:''}
    ${skip?`<div style="margin-top:7px;display:flex;flex-wrap:wrap;gap:5px">${SKIP_REASONS_EX.map(r=>`<button class="dl-skip-reason ${sr===r.l?'active':''}" onclick="setExSkip('${w.id}','${r.l}')" style="font-size:0.62rem;${sr===r.l?'background:var(--amber);border-color:var(--amber);color:white':''}">${r.e} ${r.l}</button>`).join('')}</div>`:''}
    <textarea class="dl-notes" style="display:${done||part?'block':'none'}" placeholder="How it went — tempo reached, what felt clean, what to chase next…" onchange="saveNotes('${w.id}',this.value)">${notes}</textarea>
   </div>`;
  });
 });
 document.getElementById('dlBody').innerHTML=html;
 const total=dw.length;const dn=dw.filter(w=>getSt(w,dateStr)==='done').length;
 document.getElementById('dlProgress').textContent=`${dn} of ${total} done`;
}
function ensureCheck(w,ds){if(!w.checks)w.checks={};if(!w.checks[ds])w.checks[ds]={status:'none',notes:'',skipReason:''};}
function cycleSt(id,ns){const w=workouts.find(x=>x.id===id);if(!w)return;const ds=dayLogState.dateStr;ensureCheck(w,ds);const cur=w.checks[ds].status;w.checks[ds].status=cur===ns?'none':ns;if(w.checks[ds].status!=='skip')w.checks[ds].skipReason='';persist();renderDayLogBody();}
function setExSkip(id,reason){const w=workouts.find(x=>x.id===id);if(!w)return;const ds=dayLogState.dateStr;ensureCheck(w,ds);w.checks[ds].skipReason=reason;persist();renderDayLogBody();}
function saveNotes(id,val){const w=workouts.find(x=>x.id===id);if(!w)return;const ds=dayLogState.dateStr;ensureCheck(w,ds);w.checks[ds].notes=val;persist();}
function setDayStatus(s){const ds=dayLogState.dateStr;if(s==='done'){delete daySkips[ds];}else{daySkips[ds]={skipped:true,reason:s};}saveDaySkips();renderDayLogBody();}

/* ============================ BENCH + REF VIEWS ============================ */
function renderBench(){
 return `<div class="panel"><div class="panel-h"><h2>Benchmarks</h2><p>The exit standard for each week. Hit these before moving on — they gate the next phase.</p></div>
 ${BENCH.map(b=>`<div class="bcard"><div class="bcard-title">${b.wk}</div><div class="bcard-sub">${b.sub}</div><ul>${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}
 <div class="bcard" style="border-color:var(--accent)"><div class="bcard-title">The one that matters</div><div class="bcard-sub">overall goal</div><ul><li>Perform 如烟 solo on stage — sung with full acoustic-electric guitar, shaped dynamics, confident intro and a clean fade on "已经如烟"</li></ul></div>
 </div>`;
}

function chordSVG(dots,opens,muted,barre){
 // 6 strings (low E..high e left..right), 4 frets. barre={fret,from,to} (string indices)
 const W=74,H=88,padX=10,padTop=16,gw=(W-padX*2)/5,fh=(H-padTop-8)/4;
 let s=`<svg viewBox="0 0 ${W} ${H}">`;
 s+=`<rect x="${padX}" y="${padTop}" width="${gw*5}" height="${fh*4}" fill="none" stroke="#B8B6B0" stroke-width="1"/>`;
 for(let f=1;f<4;f++){s+=`<line x1="${padX}" y1="${padTop+fh*f}" x2="${padX+gw*5}" y2="${padTop+fh*f}" stroke="#D0CEC8" stroke-width="1"/>`;}
 for(let g=1;g<5;g++){s+=`<line x1="${padX+gw*g}" y1="${padTop}" x2="${padX+gw*g}" y2="${padTop+fh*4}" stroke="#D0CEC8" stroke-width="1"/>`;}
 s+=`<rect x="${padX}" y="${padTop-3}" width="${gw*5}" height="3" fill="#1C1B18"/>`;
 if(barre){const y=padTop+fh*(barre.fret-0.5);s+=`<rect x="${padX+gw*barre.from-5}" y="${y-5}" width="${gw*(barre.to-barre.from)+10}" height="10" rx="5" fill="#1A6B45"/>`;}
 (opens||[]).forEach(st=>{s+=`<circle cx="${padX+gw*st}" cy="${padTop-8}" r="3" fill="none" stroke="#1A6B45" stroke-width="1.3"/>`;});
 (muted||[]).forEach(st=>{s+=`<text x="${padX+gw*st}" y="${padTop-5}" font-size="8" text-anchor="middle" fill="#9B2C2C" font-family="monospace">×</text>`;});
 (dots||[]).forEach(d=>{s+=`<circle cx="${padX+gw*d[0]}" cy="${padTop+fh*(d[1]-0.5)}" r="6" fill="#1A6B45"/>`;});
 s+=`</svg>`;return s;
}
function renderRef(){
 // string index 0..5 = low E,A,D,G,B,e
 const chords=[
  {n:'G',sub:'sounds A',svg:chordSVG([[0,3],[1,2],[5,3]],[2,3,4],[])},
  {n:'Am',sub:'sounds Bm',svg:chordSVG([[2,2],[3,2],[4,1]],[1,5],[0])},
  {n:'C',sub:'sounds D',svg:chordSVG([[1,3],[2,2],[4,1]],[3,5],[0])},
  {n:'Em',sub:'sounds F#m',svg:chordSVG([[1,2],[2,2]],[0,3,4,5],[])},
  {n:'Bm',sub:'sounds C#m · barre',svg:chordSVG([[2,4],[3,4],[4,3]],[],[0],{fret:2,from:1,to:5})},
  {n:'Bm7',sub:'easy Bm sub',svg:chordSVG([[1,2],[3,2],[5,2]],[2,4],[0])},
  {n:'Gsus2',sub:'sounds Asus2 · intro colour',svg:chordSVG([[0,3],[4,3],[5,3]],[1,2,3],[])},
 ];
 const struct=[
  {t:'Intro',c:'inst',b:'Instrumental. Solo: set the mood with a gentle picked figure or held chord. <b>Gsus2 – G</b>'},
  {t:'Verse 1',c:'',b:'Fingerpicked, intimate. <b>Am – C – G – Em</b> (with small tails: …G–C, …Em–Em, …G–G)'},
  {t:'Chorus 1',c:'',b:'"有没有那么一种永远" — fuller strum. <b>Am – Em – Am – Em – G / C – Em – Am – G / C – G</b>'},
  {t:'Interlude',c:'inst',b:'Instrumental gap. Solo: keep a <b>Gsus2 – G</b> vamp going, no silence.'},
  {t:'Verse 2',c:'',b:'Same shapes as verse 1, denser lyric in places.'},
  {t:'Chorus 2',c:'',b:'As chorus 1, a touch bigger. Approach lines resolve <b>Bm – G</b>.'},
  {t:'Bridge',c:'',b:'"耳际眼前此生重演" — reflective, pulled back. <b>C – G – Am – C – G / C – G – Am – Em – G</b>'},
  {t:'Choruses 3–5',c:'',b:'Rose / bookmark / poem variants — same shape: <b>Am – Em / Am – Em / C – Em / Bm – G</b>, rising intensity.'},
  {t:'Final Build',c:'',b:'"有没有那么一个明天" — same chorus shape, hardest strumming, fullest voice.'},
  {t:'Climax',c:'peak',b:'"我不要告别" — the peak. <b>C – G – G / C – G – G</b>'},
  {t:'Outro / Fade',c:'peak',b:'"看着指尖 已经如烟" — <b>Am – C – G – Em</b>, drop to near-silence, one soft chord fading out.'},
 ];
 return `<div class="panel"><div class="panel-h"><h2>Reference</h2><p>Capo on fret 2 · Original key A major · ~90 bpm, 4/4 · Music 石头, lyrics 阿信</p></div>
 <div class="bcard"><div class="bcard-title">The shapes</div><div class="bcard-sub">finger these with capo on 2 — they sound a tone higher</div>
 <div class="chord-grid">${chords.map(c=>`<div class="chord-box"><div class="cname">${c.n}</div>${c.svg}<div class="csub">${c.sub}</div></div>`).join('')}</div>
 <p style="font-size:0.74rem;color:var(--muted);margin-top:12px;line-height:1.5">Green ring = open string, × = don\u2019t play, green bar = barre. Four easy open shapes (G, Am, C, Em) carry most of the song. <b>Bm</b> is the one barre — it appears only briefly at a few chorus approach points; the open <b>Bm7</b> (x20202) is a clean stand-in if the barre isn\u2019t ready. Weeks 2–4 build the Bm barre step by step (look for the "Bm Build" cards) so it\u2019s solid before the back-half choruses in Weeks 7–8. <b>Gsus2</b> is just a G colour for the intro — plain G works fine.</p></div>
 <div class="bcard"><div class="bcard-title">Chord chart</div><div class="bcard-sub">chords only · capo 2 · keep the chord4 sheet open for the words</div>
 <div class="struct">
  <div class="struct-row"><span class="struct-tag">Verse</span><span class="struct-body"><b>Am C G Em &nbsp;/&nbsp; Am C G C &nbsp;/&nbsp; C Am Em Em &nbsp;/&nbsp; C Am G G</b></span></div>
  <div class="struct-row"><span class="struct-tag">Chorus</span><span class="struct-body"><b>Am Em &nbsp;/&nbsp; Am Em G &nbsp;/&nbsp; C Em &nbsp;/&nbsp; Am G &nbsp;/&nbsp; C G G</b></span></div>
  <div class="struct-row"><span class="struct-tag inst">Interlude</span><span class="struct-body"><b>Gsus2 G Gsus2 G</b></span></div>
  <div class="struct-row"><span class="struct-tag">Chorus var.</span><span class="struct-body">rose / bookmark / poem: <b>Am Em &nbsp;/&nbsp; Am Em &nbsp;/&nbsp; C Em &nbsp;/&nbsp; Bm G</b> (tails resolve through <b>Bm G</b>)</span></div>
  <div class="struct-row"><span class="struct-tag">Bridge</span><span class="struct-body"><b>C G Am C G &nbsp;/&nbsp; C G Am Em G</b></span></div>
  <div class="struct-row"><span class="struct-tag peak">Climax</span><span class="struct-body"><b>C G G &nbsp;/&nbsp; C G G</b> &nbsp;→&nbsp; ending <b>Am C G Em</b></span></div>
 </div>
 <p style="font-size:0.72rem;color:var(--muted);margin-top:12px;line-height:1.5">Corrected from the chord4 export: its transposer left <b>#Fm</b> and <b>#Bm</b> un-shifted — those should read <b>Em</b> and <b>Bm</b> here. The "/" marks phrase ends, not strict bar lines; the word alignment lives on the chord4 sheet.</p></div>
 <div class="bcard"><div class="bcard-title">Section map</div><div class="bcard-sub">your solo arrangement, start to fade</div>
 <div class="struct">${struct.map(s=>`<div class="struct-row"><span class="struct-tag ${s.c}">${s.t}</span><span class="struct-body">${s.b}</span></div>`).join('')}</div></div>
 <div class="bcard"><div class="bcard-title">Stage notes</div><div class="bcard-sub">acoustic-electric, plugged in</div>
 <ul><li>Roll back bass and harsh upper-mid on the preamp so it isn\u2019t boomy through a PA</li><li>Ask sound for "a little reverb on guitar and voice"</li><li>Tune on stage with the onboard tuner between songs</li><li>Spare strings packed; strings fresh but not brand-new on show day</li></ul></div>
 </div>`;
}

/* ============================ EXPORT / IMPORT / RESET ============================ */
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doExport(){
 const data={plan:workouts,daySkips,exported:new Date().toISOString()};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download='ruyan-plan-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
 showToast('Backup downloaded');
}
function doImport(ev){
 const f=ev.target.files[0];if(!f)return;const r=new FileReader();
 r.onload=()=>{try{const d=JSON.parse(r.result);
   if(d.plan){const idx={};d.plan.forEach(w=>{idx[w.week+'|'+w.day+'|'+w.movement]=w.checks||{};});
    workouts.forEach(w=>{const k=w.week+'|'+w.day+'|'+w.movement;if(idx[k])w.checks=idx[k];});}
   if(d.daySkips){daySkips=d.daySkips;saveDaySkips();}
   persist();render();showToast('Progress restored');
  }catch(e){showToast('Could not read that file');}};
 r.readAsText(f);ev.target.value='';
}
function doReset(){
 if(!confirm('Erase all logged progress and reload the fresh plan? Export a backup first if unsure.'))return;
 try{localStorage.removeItem('ruyan_plan');localStorage.removeItem('ruyan_dayskips');}catch(e){}
 daySkips={};workouts=build();persist();render();showToast('Plan reset');
}

/* ============================ BOOT ============================ */
init();
// jump to the current week if we're inside the plan window
(function(){const now=new Date();for(const wm of WEEKS_META){const mon=getDate(wm.num,'Monday');const sun=getDate(wm.num,'Sunday');sun.setHours(23,59,59);if(now>=mon&&now<=sun){activeWeek=wm.num;break;}}})();
render();
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeExp();}});
// PWA: register service worker (relative path works under any GitHub Pages repo name)
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
